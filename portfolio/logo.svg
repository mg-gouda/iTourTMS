  <defs>
    <style>
      @keyframes globeGlow {
        0%,100% { filter: drop-shadow(0 0 0px rgba(39,138,204,0)); }
        50%      { filter: drop-shadow(0 0 10px rgba(39,138,204,0.55)); }
      }
      @keyframes wordIn {
        from { opacity:0; transform:translateX(10px); }
        to   { opacity:1; transform:translateX(0); }
      }
      @keyframes tagIn {
        from { opacity:0; }
        to   { opacity:1; }
      }
      #globe    { animation: globeGlow 4s ease-in-out infinite; }
      #wordmark { animation: wordIn 0.7s 0.1s ease both; }
      #tagline  { animation: tagIn  0.6s 0.45s ease both; }

      .b { fill: #278ACC; }
      .n { fill: #001E72; }
    </style>
  </defs>

